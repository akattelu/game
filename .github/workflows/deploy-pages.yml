name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - run: zig build -Dweb-backend=webgl --release=safe
      - run: zig build -Dweb-backend=webgpu --release=safe

      - uses: actions/upload-pages-artifact@v3
        with:
          path: zig-out/web

      - id: deployment
        uses: actions/deploy-pages@v4
